name: CI

# Thin stub — the gate and steps live in chrischall/workflows.
# Status-mode gate: un-armed PRs are blocked by a yellow `ci-gated: pending`
# commit status (not a red failing job); the repo ruleset requires the
# `ci-gated` status context (flipped from `ci / ci` alongside this).
# The permissions block is load-bearing: the reusable workflow posts the
# `ci-gated` status with this token.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  statuses: write

jobs:
  ci:
    uses: chrischall/workflows/.github/workflows/reusable-mcp-ci.yml@main
    with:
      node-version: "26"
      build-command: npm run build
      test-command: npm test
      gate-mode: status
